<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SwiftScribe — Login / Sign Up</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --teal: #1D9E75; --teal-dark: #0F6E56; --teal-light: #E1F5EE; --bg: #FAFAF8; --text: #1A1A18; --text-muted: #6B6B65; --border: rgba(0,0,0,0.12); --radius: 10px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .logo { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
  .logo span { color: var(--teal); }
  .tagline { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 2rem; }
  .tabs { display: flex; background: #F4F2EC; border-radius: 10px; padding: 4px; margin-bottom: 1.5rem; }
  .tab { flex: 1; padding: 9px; text-align: center; font-size: 14px; font-weight: 500; border-radius: 8px; cursor: pointer; color: var(--text-muted); border: none; background: transparent; }
  .tab.active { background: white; color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .form-group { margin-bottom: 1rem; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; }
  input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; font-family: inherit; }
  input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
  .btn { width: 100%; padding: 13px; border-radius: var(--radius); border: none; background: var(--teal); color: white; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
  .btn:hover { background: var(--teal-dark); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg { font-size: 13px; text-align: center; margin-top: 1rem; padding: 10px 14px; border-radius: 8px; display: none; }
  .msg.success { background: var(--teal-light); color: var(--teal-dark); display: block; }
  .msg.error { background: #fdecea; color: #c62828; display: block; }
  .panel { display: none; }
  .panel.active { display: block; }
  .switch-link { text-align: center; margin-top: 1rem; font-size: 13px; color: var(--text-muted); }
  .switch-link a { color: var(--teal); font-weight: 500; cursor: pointer; }
  .back { text-align: center; margin-top: 1.5rem; font-size: 13px; }
  .back a { color: var(--text-muted); text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Swift<span>Scribe</span></div>
  <div class="tagline">Data Entry · Copywriting · Transcription</div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
  </div>

  <!-- LOGIN PANEL -->
  <div class="panel active" id="panel-login">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Your password" onkeydown="if(event.key==='Enter')handleLogin()" />
    </div>
    <button class="btn" id="login-btn" onclick="handleLogin()">Sign In →</button>
    <div class="msg" id="login-msg"></div>
    <div class="switch-link">No account? <a onclick="switchTab('signup')">Sign up free</a></div>
  </div>

  <!-- SIGNUP PANEL -->
  <div class="panel" id="panel-signup">
    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="signup-name" placeholder="Jane Smith" />
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="signup-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter')handleSignup()" />
    </div>
    <button class="btn" id="signup-btn" onclick="handleSignup()">Create Account →</button>
    <div class="msg" id="signup-msg"></div>
    <div class="switch-link">Have an account? <a onclick="switchTab('login')">Sign in</a></div>
  </div>

  <div class="back"><a href="index.html">← Back to SwiftScribe</a></div>
</div>

<!-- Supabase via CDN (non-module) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://hbfhawofcbmgtogqgmah.supabase.co',
    'sb_publishable_2Bf8rNxdWOnwE4kZ8HmiWg_mExzONOv'
  );
  const ADMIN = 'nel45090@gmail.com';

  function switchTab(tab) {
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function goTo(email) {
    window.location.href = email === ADMIN ? 'swiftscribe-admin.html' : 'swiftscribe-portal.html';
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-password').value;
    if (!email || !pass) { showMsg('login-msg', 'Please enter your email and password.', 'error'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      goTo(data.user.email);
    } catch(e) {
      showMsg('login-msg', e.message || 'Sign in failed. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }

  async function handleSignup() {
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pass = document.getElementById('signup-password').value;
    if (!name || !email || !pass) { showMsg('signup-msg', 'Please fill in all fields.', 'error'); return; }
    if (pass.length < 6) { showMsg('signup-msg', 'Password must be at least 6 characters.', 'error'); return; }
    const btn = document.getElementById('signup-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
      if (error) throw error;
      showMsg('signup-msg', '✅ Account created! Signing you in...', 'success');
      setTimeout(() => goTo(email), 1500);
    } catch(e) {
      showMsg('signup-msg', e.message || 'Sign up failed. Please try again.', 'error');
      btn.disabled = false; btn.textContent = 'Create Account →';
    }
  }

  // Auto redirect if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) goTo(data.session.user.email);
  });
</script>
</body>
</html>
